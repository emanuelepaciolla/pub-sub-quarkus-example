# =============================================================================
# Application
# =============================================================================
quarkus.application.name=pubsub-demo

# =============================================================================
# Database (produzione: valori da env vars)
# =============================================================================
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USERNAME:postgres}
quarkus.datasource.password=${DB_PASSWORD:postgres}
quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5432/gcpdemo}
quarkus.hibernate-orm.database.generation=update

# =============================================================================
# GCP — config base
# =============================================================================
gcp.project-id=${GCP_PROJECT_ID:local-project}

# Host emulatore Pub/Sub. Vuoto = usa GCP reale con ADC.
gcp.pubsub.emulator-host=${PUBSUB_EMULATOR_HOST:}

# --- Topics (configKey → nome topic GCP) ---
gcp.pubsub.topics.demo=${PUBSUB_TOPIC_DEMO:demo-topic}
gcp.pubsub.topics.userevent=${PUBSUB_TOPIC_USER:user-events}
gcp.pubsub.topics.systemevent=${PUBSUB_TOPIC_SYSTEM:system-events}
gcp.pubsub.topics.notification=${PUBSUB_TOPIC_NOTIF:notification-events}

# --- Dead Letter Queue ---
gcp.pubsub.dlq.topic-name=${PUBSUB_DLQ_TOPIC:messages-dlq}
gcp.pubsub.dlq.subscription-name=${PUBSUB_DLQ_SUB:messages-dlq-sub}
gcp.pubsub.dlq.max-delivery-attempts=${PUBSUB_DLQ_MAX_ATTEMPTS:5}

# --- Subscriptions (configKey → name + topic) ---
gcp.pubsub.subscriptions.demo.name=${PUBSUB_SUB_DEMO:demo-subscription}
gcp.pubsub.subscriptions.demo.topic=${PUBSUB_TOPIC_DEMO:demo-topic}

gcp.pubsub.subscriptions.userevent.name=${PUBSUB_SUB_USER:user-events-sub}
gcp.pubsub.subscriptions.userevent.topic=${PUBSUB_TOPIC_USER:user-events}

gcp.pubsub.subscriptions.systemevent.name=${PUBSUB_SUB_SYSTEM:system-events-sub}
gcp.pubsub.subscriptions.systemevent.topic=${PUBSUB_TOPIC_SYSTEM:system-events}

gcp.pubsub.subscriptions.notification.name=${PUBSUB_SUB_NOTIF:notification-events-sub}
gcp.pubsub.subscriptions.notification.topic=${PUBSUB_TOPIC_NOTIF:notification-events}

# --- Retry policy ---
gcp.pubsub.retry.max-attempts=${PUBSUB_RETRY_MAX_ATTEMPTS:5}
gcp.pubsub.retry.initial-backoff-ms=${PUBSUB_RETRY_INITIAL_MS:100}
gcp.pubsub.retry.max-backoff-ms=${PUBSUB_RETRY_MAX_MS:60000}
gcp.pubsub.retry.backoff-multiplier=${PUBSUB_RETRY_MULTIPLIER:2.0}
gcp.pubsub.retry.total-timeout-ms=${PUBSUB_RETRY_TIMEOUT_MS:600000}
gcp.pubsub.retry.max-ack-extension-seconds=${PUBSUB_RETRY_ACK_EXT_SECS:60}

# =============================================================================
# Security: JWT (SmallRye JWT — RS256)
# =============================================================================
mp.jwt.verify.publickey.location=META-INF/resources/publicKey.pem
mp.jwt.verify.issuer=https://pubsub-demo.example.com

# Permessi HTTP: endpoints pubblici (health) + tutti gli altri richiedono auth
quarkus.http.auth.permission.health.paths=/q/health,/q/health/*
quarkus.http.auth.permission.health.policy=permit
quarkus.http.auth.permission.authenticated.paths=/*
quarkus.http.auth.permission.authenticated.policy=authenticated

# =============================================================================
# OpenAPI / Swagger
# =============================================================================
quarkus.smallrye-openapi.info-title=PubSub Demo API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=Quarkus + GCP Pub/Sub — multiple topics demo
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui.html

# =============================================================================
# Health
# =============================================================================
quarkus.smallrye-health.root-path=/q/health

# =============================================================================
# Logging
# =============================================================================
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n
quarkus.log.level=INFO
quarkus.log.category."com.example".level=DEBUG

# =============================================================================
# Profilo %dev — sviluppo locale con docker-compose
# =============================================================================
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/gcpdemo
%dev.quarkus.datasource.username=postgres
%dev.quarkus.datasource.password=postgres
%dev.quarkus.hibernate-orm.log.sql=true
%dev.quarkus.hibernate-orm.database.generation=drop-and-create

%dev.gcp.project-id=local-project
%dev.gcp.pubsub.emulator-host=localhost:8085

%dev.quarkus.swagger-ui.always-include=true

# =============================================================================
# Profilo %test
# =============================================================================
%test.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/gcpdemo_test
%test.quarkus.datasource.username=postgres
%test.quarkus.datasource.password=postgres
%test.quarkus.hibernate-orm.database.generation=drop-and-create
%test.gcp.project-id=local-project
%test.gcp.pubsub.emulator-host=localhost:8085
